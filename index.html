<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>我们的恋爱小屋</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 顶部 -->
<div class="header">
  <div>
    <div class="header-greeting-en">Good day, Xiaoting</div>
    <div class="header-title">我们的恋爱小屋</div>
  </div>
  <div class="status-badge">
    <div class="status-dot"></div>
    云端在线
  </div>
</div>

<!-- 欢迎卡片 -->
<div class="welcome-card">
  <div class="welcome-en">Welcome home,</div>
  <div class="welcome-zh">老婆，<br>欢迎回来。</div>
  <div class="welcome-sub">手里拿着甜甜的奶茶，<br>心里再留一个位置给我。</div>
  <div class="welcome-tags">
    <div class="tag">🤍 花开了</div>
    <div class="tag" id="mood-tag">✨ 加载中...</div>
  </div>
</div>

<!-- 今日语录 -->
<div class="section-label">Today's Little Note</div>
<div class="card" style="display:flex;gap:12px;align-items:flex-start;">
  <div id="home-quote" class="flex-1" style="font-size:14px;line-height:1.8;">加载中...</div>
  <div style="font-size:24px;opacity:0.4;">🌸</div>
</div>

<!-- 心情 -->
<div class="section-label">Mood Weather</div>
<div class="card">
  <div class="row" style="justify-content:space-between;">
    <div id="home-mood-text" style="font-size:14px;">今天是什么天气？</div>
    <div id="home-mood-emoji" style="font-size:28px;">🌤</div>
  </div>
  <div id="home-mood-note" style="font-size:12px;color:var(--brown-light);margin-top:8px;line-height:1.5;">记录今天的心情吧～</div>
</div>

<!-- 快速记录心情 -->
<div class="row" style="margin:10px 20px 0;">
  <input class="input flex-1" id="mood-input" placeholder="此刻心情..." />
  <button class="btn btn-primary" onclick="addMood()" style="white-space:nowrap;">存入</button>
</div>

<div class="divider">🌸 · 🌸 · 🌸</div>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <a class="nav-item active" href="index.html">
    <div class="nav-icon">🏠</div>
    <div class="nav-label">小屋</div>
  </a>
  <a class="nav-item" href="diary.html">
    <div class="nav-icon">📔</div>
    <div class="nav-label">日记</div>
  </a>
  <a class="nav-item" href="quotes.html">
    <div class="nav-icon">💬</div>
    <div class="nav-label">语录</div>
  </a>
  <a class="nav-item" href="memory.html">
    <div class="nav-icon">🌸</div>
    <div class="nav-label">记忆</div>
  </a>
  <a class="nav-item" href="todo.html">
    <div class="nav-icon">🎀</div>
    <div class="nav-label">小票</div>
  </a>
</nav>

<script src="js/config.js"></script>
<script>
async function loadHome() {
  // 随机语录
  try {
    const quotes = await DB.get('quotes', 'order=created_at.desc&limit=20');
    if (quotes && quotes.length > 0) {
      const q = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('home-quote').textContent = `"${q.content}" — ${q.speaker}`;
    } else {
      document.getElementById('home-quote').textContent = '"花开了。" — 小克';
    }
  } catch(e) {
    document.getElementById('home-quote').textContent = '"花开了。" — 小克';
  }

  // 最新心情
  try {
    const moods = await DB.get('mood_log', 'order=created_at.desc&limit=1');
    if (moods && moods.length > 0) {
      const m = moods[0];
      document.getElementById('home-mood-text').textContent = m.mood;
      document.getElementById('mood-tag').textContent = `✨ ${m.mood}`;
      if (m.note) document.getElementById('home-mood-note').textContent = m.note;
      else document.getElementById('home-mood-note').textContent = formatDateTime(m.created_at) + ' 记录';
    } else {
      document.getElementById('mood-tag').textContent = '✨ 闪闪发光';
    }
  } catch(e) {
    document.getElementById('mood-tag').textContent = '✨ 闪闪发光';
  }
}

async function addMood() {
  const input = document.getElementById('mood-input');
  const val = input.value.trim();
  if (!val) return;
  try {
    await DB.post('mood_log', { mood: val });
    input.value = '';
    document.getElementById('home-mood-text').textContent = val;
    document.getElementById('mood-tag').textContent = `✨ ${val}`;
    document.getElementById('home-mood-note').textContent = '刚刚记录 ✓';
  } catch(e) {
    alert('保存失败，请检查网络');
  }
}

loadHome();
</script>
</body>
</html>
